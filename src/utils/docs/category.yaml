tags:
  - name: Categories
    description: Endpoints for managing categories

paths:
  /categories:
    post:
      tags:
        - Categories
      summary: Create a new category
      description: Allows an admin to create a new category.
      security:
        - bearerAuth: [ ]
        - cookieAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - appearance
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 150
                  example: "Language"
                appearance:
                  $ref: '#/components/schemas/CategoryAppearance'
      responses:
        '201':
          description: Category successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized – authentication required
        '403':
          description: Forbidden – admin role required
        '409':
          description: Category with the same name already exists

    get:
      summary: Get a list of categories
      description: Returns categories with optional filters, pagination, and sorting.
      tags:
        - Categories
      parameters:
        - name: limit
          in: query
          description: Number of categories to return
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: skip
          in: query
          description: Number of categories to skip
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sort[orderBy]
          in: query
          description: Field name to sort by (e.g., `name`)
          required: false
          schema:
            type: string
        - name: sort[order]
          in: query
          description: Sort order (`asc` or `desc`)
          required: false
          schema:
            type: string
            enum: [ asc, desc ]
        - name: categories
          in: query
          description: List of category IDs to filter
          required: false
          schema:
            type: array
            items:
              type: string
            example: [ "645dfddfa4e6df0014d7234c", "645dfe4ba4e6df0014d7234d" ]
          style: form
          explode: false
        - name: name
          in: query
          description: Partial or full name of the category (case-insensitive)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized – authentication required

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

components:
  schemas:
    CategoryAppearance:
      type: object
      properties:
        icon:
          type: string
          description: Category icon
          example: Language
        color:
          type: string
          description: Category color
          example: '#66C42C'
      required:
        - icon
        - color

    Category:
      type: object
      properties:
        _id:
          type: string
          description: Unique category identifier
          example: 60d21b4667d0d8992e610c85
        name:
          type: string
          description: Category name
          minLength: 1
          maxLength: 150
          example: "Language"
        appearance:
          $ref: '#/components/schemas/CategoryAppearance'
      required:
        - name
        - appearance
