tags:
  - name: Category
    description: Endpoints for managing categories

paths:
  /categories:
    post:
      tags:
        - Category
      summary: Create a new category
      description: Allows an admin to create a new category.
      security:
        - bearerAuth: [ ]
        - cookieAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - appearance
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 150
                  example: "Language"
                appearance:
                  $ref: '#/components/schemas/CategoryAppearance'
      responses:
        '201':
          description: Category successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized – authentication required
        '403':
          description: Forbidden – admin role required
        '409':
          description: Category with the same name already exists

  /categories/names:
    get:
      tags:
        - Category
      summary: Get list of category names
      description: Returns a list of category names with optional filters like pagination, sorting, and name search.
      security:
        - bearerAuth: [ ]
        - cookieAuth: [ ]
      parameters:
        - name: limit
          in: query
          description: Number of results to return
          required: false
          schema:
            type: integer
            minimum: 0
        - name: skip
          in: query
          description: Number of results to skip
          required: false
          schema:
            type: integer
            minimum: 0
        - name: sort[orderBy]
          in: query
          description: Field to sort by (e.g. name)
          required: false
          schema:
            type: string
        - name: sort[order]
          in: query
          description: Sort order (asc or desc)
          required: false
          schema:
            type: string
            enum: [ asc, desc ]
        - name: categories
          in: query
          description: Comma-separated list of category IDs to filter
          required: false
          schema:
            type: string
        - name: name
          in: query
          description: Partial match on category name
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of category names retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  categoriesNames:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                          description: Unique category ID
                          example: 60d21b4667d0d8992e610c85
                        name:
                          type: string
                          description: Category name
                          example: "Language"
        '401':
          description: Unauthorized – authentication required


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
  schemas:
    CategoryAppearance:
      type: object
      properties:
        icon:
          type: string
          description: Category icon
          example: Language
        color:
          type: string
          description: Category color
          example: '#66C42C'
      required:
        - icon
        - color

    Category:
      type: object
      properties:
        _id:
          type: string
          description: Unique category identifier
          example: 60d21b4667d0d8992e610c85
        name:
          type: string
          description: Category name
          minLength: 1
          maxLength: 150
          example: "Language"
        appearance:
          $ref: '#/components/schemas/CategoryAppearance'
      required:
        - name
        - appearance