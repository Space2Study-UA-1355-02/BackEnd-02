tags:
  - name: Category
    description: Endpoints for managing categories

paths:
  /categories:
    post:
      tags:
        - Category
      summary: Create a new category
      description: Allows an admin to create a new category.
      security:
        - bearerAuth: [ ]
        - cookieAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - appearance
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 150
                  example: "Language"
                appearance:
                  $ref: '#/components/schemas/CategoryAppearance'
      responses:
        '201':
          description: Category successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Invalid request payload
        '401':
          description: Unauthorized – authentication required
        '403':
          description: Forbidden – admin role required
        '409':
          description: Category with the same name already exists

  /categories/{id}:
    get:
      tags:
        - Category
      summary: Get category by ID
      description: Returns a category by its unique ID.
      security:
        - bearerAuth: [ ]
        - cookieAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the category to retrieve
          schema:
            type: string
            example: 60d21b4667d0d8992e610c85
      responses:
        '200':
          description: Successfully retrieved the category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Invalid ID format
        '401':
          description: Unauthorized – authentication required
        '404':
          description: Category not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
  schemas:
    CategoryAppearance:
      type: object
      properties:
        icon:
          type: string
          description: Category icon
          example: Language
        color:
          type: string
          description: Category color
          example: '#66C42C'
      required:
        - icon
        - color

    Category:
      type: object
      properties:
        _id:
          type: string
          description: Unique category identifier
          example: 60d21b4667d0d8992e610c85
        name:
          type: string
          description: Category name
          minLength: 1
          maxLength: 150
          example: "Language"
        appearance:
          $ref: '#/components/schemas/CategoryAppearance'
      required:
        - name
        - appearance