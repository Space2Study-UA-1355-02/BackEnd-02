tags:
  - name: Offers
    description: Endpoints for managing offers

paths:
  /offers:
    get:
      summary: Get a list of offers using aggregation pipeline
      tags: [ Offers ]
      parameters:
        - in: query
          name: title
          schema:
            type: string
          description: Filter by title
        - in: query
          name: languages
          schema:
            type: string
          description: Comma-separated languages to filter
        - in: query
          name: category
          schema:
            type: string
          description: Category ID
        - in: query
          name: subject
          schema:
            type: string
          description: Subject ID
        - in: query
          name: sort
          schema:
            type: string
          description: Sorting (e.g. "price:asc")
      responses:
        '200':
          description: List of offers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Offer'
                  count:
                    type: integer

    post:
      summary: Create a new offer
      tags: [ Offers ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferInput'
      responses:
        '201':
          description: Offer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'

  /offers/{id}:
    get:
      summary: Get offer by ID
      tags: [ Offers ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Offer ID
      responses:
        '200':
          description: Offer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'

    put:
      summary: Update an offer
      tags: [ Offers ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Offer ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferInput'
      responses:
        '204':
          description: Offer updated successfully

    delete:
      summary: Delete an offer
      tags: [ Offers ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Offer ID
      responses:
        '204':
          description: Offer deleted successfully

components:
  schemas:
    Offer:
      type: object
      properties:
        _id:
          type: string
        price:
          type: number
        proficiencyLevel:
          type: string
          enum: [ beginner, intermediate, advanced ]
        title:
          type: string
        description:
          type: string
        languages:
          type: array
          items:
            type: string
        authorRole:
          type: string
        author:
          type: object
          properties:
            firstName:
              type: string
            lastName:
              type: string
            totalReviews:
              type: integer
            averageRating:
              type: number
            photo:
              type: string
            professionalSummary:
              type: string
            FAQ:
              type: array
              items:
                $ref: '#/components/schemas/FAQItem'
        subject:
          type: object
          properties:
            name:
              type: string
        category:
          type: object
          properties:
            appearance:
              type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OfferInput:
      type: object
      required:
        - title
        - price
        - description
        - languages
        - subject
        - category
        - status
      properties:
        title:
          type: string
        price:
          type: number
        description:
          type: string
        languages:
          type: array
          items:
            type: string
        proficiencyLevel:
          type: string
        subject:
          type: string
        category:
          type: string
        status:
          type: string
        FAQ:
          type: array
          items:
            $ref: '#/components/schemas/FAQItem'

    FAQItem:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string