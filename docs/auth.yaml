tags:
  - name: Auth
    description: Authentication and Authorization

paths:
  /auth/signup:
    post:
      summary: Register a new user
      tags: [ Auth ]
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Signup'
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingUpResponse'
        '400':
          description: Invalid language
        '422':
          description: invalid input
        '409':
          description: validation error

  /login:
    post:
      summary: User login and receive access/refresh tokens
      tags: [ Auth ]
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
      responses:
        '200':
          description: Successful login
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only cookies with tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
        '422':
          description: invalid input
        '409':
          description: validation error

  /logout:
    post:
      summary: Log the user out and clear tokens
      tags: [ Auth ]
      security: [ ]
      responses:
        '204':
          description: Successfully logged out (no content)

  /refresh:
    get:
      summary: Refresh access and refresh tokens
      tags: [ Auth ]
      security: [ ]
      responses:
        '200':
          description: Tokens successfully refreshed
          headers:
            Set-Cookie:
              schema:
                type: string
              description: New cookies with access/refresh tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Missing or invalid refresh token

  /forgot-password:
    post:
      summary: Send password reset email
      tags: [ Auth ]
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
      responses:
        '204':
          description: Reset email sent successfully (no content)

  /reset-password/{token}:
    patch:
      summary: Update password using reset token
      tags: [ Auth ]
      security: [ ]
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
          description: Password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
      responses:
        '204':
          description: Password successfully updated (no content)
        '400':
          description: Invalid or expired token

components:
  schemas:
    Signup:
      type: object
      required:
        - role
        - firstName
        - lastName
        - email
        - password
      properties:
        role:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string

    Login:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ForgotPassword:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPassword:
      type: object
      required:
        - password
      properties:
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string

    SingUpResponse:
      type: object
      properties:
        userId:
          type: string
        userEmail:
          type: string