tags:
  - name: Questions
    description: Endpoints for managing questions

paths:
  /questions:
    get:
      summary: Get list of questions created by the current user
      tags: [ Questions ]
      parameters:
        - in: query
          name: title
          schema:
            type: string
          description: Filter by question title
        - in: query
          name: categories
          schema:
            type: array
            items:
              type: string
          description: Filter by category IDs
        - in: query
          name: sort
          schema:
            type: string
            example: "createdAt:desc"
          description: Sorting option
        - in: query
          name: skip
          schema:
            type: integer
            example: 0
        - in: query
          name: limit
          schema:
            type: integer
            example: 10
      responses:
        '200':
          description: List of user's questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Question'
                  count:
                    type: integer

    post:
      summary: Create a new question
      tags: [ Questions ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuestion'
      responses:
        '201':
          description: Question created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'

  /questions/{id}:
    get:
      summary: Get a question by ID
      tags: [ Questions ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Question ID
      responses:
        '200':
          description: Question data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'

    put:
      summary: Update an existing question
      tags: [ Questions ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Question ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuestion'
      responses:
        '200':
          description: Updated question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'

    delete:
      summary: Delete a question
      tags: [ Questions ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Question ID
      responses:
        '204':
          description: Question deleted

components:
  schemas:
    Question:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        text:
          type: string
        answers:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
              isCorrect:
                type: boolean
        type:
          type: string
        category:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateQuestion:
      type: object
      required:
        - title
        - text
        - type
        - answers
      properties:
        title:
          type: string
          example: "What is JavaScript?"
        text:
          type: string
          example: "Explain what JavaScript is and how it's used."
        type:
          type: string
          example: "single"
        category:
          type: string
          example: "663a4b3b379152dd11ec4f7d"
        answers:
          type: array
          items:
            type: object
            required:
              - text
            properties:
              text:
                type: string
                example: "A programming language"
              isCorrect:
                type: boolean
                example: true

    UpdateQuestion:
      allOf:
        - $ref: '#/components/schemas/CreateQuestion'